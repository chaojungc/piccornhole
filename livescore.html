<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCL Live Score</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;500;600;700;900&display=swap');

  :root {
    --bg: #fdf6ec;
    --card: #ffffff;
    --accent: #c0392b;
    --accent2: #e67e22;
    --accent3: #27ae60;
    --dark: #2c3e50;
    --muted: #7f8c8d;
    --border: #e0d5c1;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--dark);
    line-height: 1.6;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #8B4513 0%, #c0392b 50%, #e67e22 100%);
    color: white;
    text-align: center;
    padding: 32px 20px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: repeating-conic-gradient(rgba(255,255,255,0.03) 0% 25%, transparent 0% 50%);
    animation: spin 60s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .header h1 {
    font-family: 'Bangers', cursive;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    letter-spacing: 2px;
    position: relative;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  }
  .header .subtitle {
    font-size: 0.95rem;
    opacity: 0.85;
    position: relative;
    margin-top: 4px;
  }

  /* ── Hamburger Menu ── */
  .hamburger-btn {
    position: absolute;
    top: 16px; left: 20px;
    z-index: 1001;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    width: 40px; height: 40px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: background 0.2s;
  }
  .hamburger-btn:hover { background: rgba(255,255,255,0.25); }
  .hamburger-btn span {
    display: block;
    width: 20px; height: 2px;
    background: white;
    border-radius: 2px;
    transition: all 0.3s;
  }
  .hamburger-btn.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  .hamburger-btn.open span:nth-child(2) { opacity: 0; }
  .hamburger-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  .nav-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
  }
  .nav-overlay.open { display: block; }

  .nav-drawer {
    position: fixed;
    top: 0; left: -280px;
    width: 280px; height: 100%;
    background: var(--card);
    z-index: 1000;
    transition: left 0.3s ease;
    box-shadow: 4px 0 20px rgba(0,0,0,0.15);
    padding: 72px 24px 24px;
    overflow-y: auto;
  }
  .nav-drawer.open { left: 0; }
  .nav-drawer a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    text-decoration: none;
    color: var(--dark);
    font-weight: 600;
    font-size: 0.95rem;
    border-radius: 10px;
    transition: all 0.2s;
    margin-bottom: 4px;
  }
  .nav-drawer a:hover { background: #f8f1e4; }
  .nav-drawer a.active { background: var(--accent); color: white; }
  .nav-drawer .nav-icon { font-size: 1.2rem; width: 28px; text-align: center; }

  /* ── Container ── */
  .container { max-width: 800px; margin: 0 auto; padding: 32px 20px; }

  /* ── Scoreboard Card ── */
  .scoreboard {
    background: var(--dark);
    border-radius: var(--radius);
    padding: 32px 24px 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    text-align: center;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .scoreboard::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
  }
  .scoreboard-match-info {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
  }
  .scoreboard-game-label {
    font-family: 'Bangers', cursive;
    font-size: 1.2rem;
    color: var(--accent2);
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .scoreboard-teams {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
  }
  .sb-team { text-align: center; }
  .sb-team-emoji { font-size: 2.5rem; }
  .sb-team-name {
    font-family: 'Bangers', cursive;
    font-size: 1.4rem;
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .sb-score {
    font-family: 'Bangers', cursive;
    font-size: 4rem;
    line-height: 1;
    cursor: default;
    min-width: 80px;
    padding: 8px 0;
    border-radius: 12px;
    transition: all 0.15s;
    user-select: none;
  }
  .sb-score.clickable { cursor: pointer; }
  .sb-score.clickable:hover { background: rgba(255,255,255,0.08); }
  .sb-score.clickable:active { transform: scale(0.95); }
  .sb-vs {
    font-family: 'Bangers', cursive;
    font-size: 1.5rem;
    color: rgba(255,255,255,0.3);
  }

  /* Score buttons */
  .score-btn {
    padding: 8px 14px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: white;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .score-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
  .score-btn.hole { border-color: var(--accent3); color: #2ecc71; }
  .score-btn.hole:hover { background: rgba(46,204,113,0.15); }
  .score-btn.lean { border-color: #3498db; color: #3498db; }
  .score-btn.lean:hover { background: rgba(52,152,219,0.15); }
  .score-btn.board { border-color: var(--accent2); color: #f39c12; }
  .score-btn.board:hover { background: rgba(243,156,18,0.15); }
  .score-btn.neg { border-color: #e74c3c; color: #e74c3c; }
  .score-btn.neg:hover { background: rgba(231,76,60,0.15); }

  /* Player cards */
  .team-section-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 16px;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .player-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 12px;
  }
  .player-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }
  .player-card-name {
    font-weight: 700;
    font-size: 0.85rem;
    margin-bottom: 4px;
    color: rgba(255,255,255,0.9);
  }
  .player-card-stats {
    display: flex;
    justify-content: center;
    gap: 10px;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.45);
    margin-bottom: 8px;
  }
  .player-stat { display: flex; align-items: center; gap: 2px; }
  .player-stat-val { font-weight: 700; }
  .player-card-pts {
    font-family: 'Bangers', cursive;
    font-size: 1.1rem;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .player-card-btns {
    display: flex;
    gap: 4px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .player-card-btns .score-btn {
    padding: 5px 8px;
    font-size: 0.65rem;
  }

  /* Game series tracker */
  .series-tracker {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .series-dot {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bangers', cursive;
    font-size: 0.9rem;
    color: rgba(255,255,255,0.3);
    transition: all 0.3s;
  }
  .series-dot.current {
    border-color: var(--accent2);
    color: var(--accent2);
    box-shadow: 0 0 12px rgba(230,126,34,0.3);
  }
  .series-dot.won-a { border-color: transparent; color: white; }
  .series-dot.won-b { border-color: transparent; color: white; }

  /* Action bar */
  .action-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
  }
  .action-btn {
    padding: 10px 24px;
    border: none;
    border-radius: 10px;
    font-family: 'Bangers', cursive;
    font-size: 1rem;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .action-btn.primary { background: var(--accent3); color: white; }
  .action-btn.primary:hover { background: #219a52; }
  .action-btn.secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.15); }
  .action-btn.secondary:hover { background: rgba(255,255,255,0.15); }
  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Setup Form ── */
  .setup-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .setup-card label {
    display: block;
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 6px;
    color: var(--dark);
  }
  .setup-card select {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 0.95rem;
    font-family: 'Inter', sans-serif;
    background: white;
    margin-bottom: 18px;
    transition: border-color 0.2s;
  }
  .setup-card select:focus { outline: none; border-color: var(--accent); }
  .start-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 700;
    font-family: 'Bangers', cursive;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .start-btn:hover { background: #a93226; }
  .start-btn:disabled { background: #bbb; cursor: not-allowed; }
  .matchup-preview {
    background: #f8f1e4;
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 20px;
    text-align: center;
    font-size: 0.9rem;
    border: 1px dashed var(--border);
  }
  .matchup-preview strong { color: var(--accent); }

  /* ── Mode cards (League / Casual) ── */
  .mode-cards {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
  }
  .mode-card {
    border: 2px solid var(--border); border-radius: 14px; padding: 14px 10px;
    text-align: center; cursor: pointer; transition: all 0.15s; background: white;
  }
  .mode-card:hover { border-color: var(--accent2); background: #fffaf4; }
  .mode-card.selected { border-color: var(--accent2); background: #fff8f0; }
  .mode-card .mc-icon { font-size: 1.6rem; margin-bottom: 5px; }
  .mode-card .mc-title { font-weight: 800; font-size: 0.85rem; color: var(--dark); }
  .mode-card .mc-desc { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
  .mode-card.selected .mc-title { color: var(--accent2); }
  .mode-section { display: none; }
  .mode-section.visible { display: block; }

  /* ── Casual team blocks ── */
  .casual-team-block {
    border: 1.5px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .casual-team-block:focus-within { border-color: var(--accent2); }
  .ctb-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .ctb-emoji { font-size: 1.3rem; flex-shrink: 0; }
  .ctb-name-input {
    flex: 1; padding: 8px 11px; border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 0.88rem; font-family: 'Inter', sans-serif; font-weight: 700;
    color: var(--dark); outline: none; background: #fafafa;
  }
  .ctb-name-input:focus { border-color: var(--accent2); background: white; }
  .ctb-players-label {
    font-size: 0.7rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
  }
  .ctb-pills { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; min-height: 32px; }
  .ctb-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: #f0e8dc; border-radius: 20px; padding: 5px 8px 5px 12px;
    font-size: 0.8rem; font-weight: 600; color: var(--dark);
  }
  .ctb-pill-remove {
    width: 18px; height: 18px; border-radius: 50%; background: rgba(0,0,0,0.1);
    border: none; cursor: pointer; font-size: 0.65rem; color: #666;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .ctb-pill-remove:hover { background: var(--accent); color: white; }
  .ctb-add-btn {
    display: inline-flex; align-items: center; gap: 4px;
    background: none; border: 1.5px dashed #c8bfb0; border-radius: 20px;
    padding: 5px 12px; font-size: 0.78rem; font-weight: 600; color: var(--muted);
    cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s;
  }
  .ctb-add-btn:hover { border-color: var(--accent2); color: var(--accent2); background: #fff8f0; }
  .ctb-add-input {
    display: none; align-items: center; gap: 5px;
    background: white; border: 1.5px solid var(--accent2);
    border-radius: 20px; padding: 4px 6px 4px 12px;
  }
  .ctb-add-input.visible { display: inline-flex; }
  .ctb-add-input input {
    border: none; outline: none; font-family: 'Inter', sans-serif;
    font-size: 0.8rem; font-weight: 600; color: var(--dark);
    width: 90px; background: transparent;
  }
  .ctb-add-input input::placeholder { color: #bbb; font-weight: 400; }
  .ctb-confirm-btn {
    width: 20px; height: 20px; border-radius: 50%; background: var(--accent3);
    border: none; cursor: pointer; font-size: 0.7rem; color: white;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .ctb-cancel-btn {
    width: 20px; height: 20px; border-radius: 50%; background: #e0d5c1;
    border: none; cursor: pointer; font-size: 0.7rem; color: #888;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  /* ── Round log ── */
  .round-log {
    margin-top: 16px;
    max-height: 160px;
    overflow-y: auto;
    padding: 8px 12px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .round-log::-webkit-scrollbar { width: 4px; }
  .round-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  .round-entry {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .round-entry:last-child { border: none; }
  .round-num { color: rgba(255,255,255,0.3); width: 30px; }
  .round-a, .round-b { width: 60px; text-align: center; }
  .round-diff { width: 60px; text-align: right; font-weight: 600; }
  .round-diff.pos { color: #2ecc71; }
  .round-diff.neg { color: #e74c3c; }
  .round-diff.zero { color: rgba(255,255,255,0.3); }
  .throw-detail {
    display: flex;
    gap: 3px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 2px;
  }
  .throw-pip {
    display: inline-block;
    width: 14px; height: 14px;
    border-radius: 50%;
    font-size: 0.5rem;
    line-height: 14px;
    text-align: center;
    font-weight: 700;
    color: white;
  }
  .throw-pip.hole { background: #2ecc71; }
  .throw-pip.lean { background: #3498db; }
  .throw-pip.board { background: #f39c12; }
  .throw-pip.neg { background: #e74c3c; }

  /* ── Match winner banner ── */
  .winner-banner {
    background: linear-gradient(135deg, #f7dc6f 0%, #f39c12 100%);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    margin-top: 20px;
    animation: popIn 0.4s ease;
  }
  @keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .winner-banner .trophy { font-size: 3rem; }
  .winner-banner .winner-text {
    font-family: 'Bangers', cursive;
    font-size: 1.5rem;
    color: var(--dark);
    letter-spacing: 2px;
    margin-top: 4px;
  }
  .winner-banner .match-summary {
    font-size: 0.85rem;
    color: #555;
    margin-top: 6px;
  }

  /* ── Responsive ── */
  @media (max-width: 550px) {
    .scoreboard-teams { gap: 8px; }
    .sb-score { font-size: 3rem; min-width: 60px; }
    .sb-team-name { font-size: 1.1rem; }
    .player-cards { grid-template-columns: 1fr 1fr; gap: 6px; }
    .player-card { padding: 8px; }
    .player-card-btns .score-btn { padding: 4px 6px; font-size: 0.6rem; }
  }
</style>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
</head>
<body>

<header class="header">
  <button class="hamburger-btn" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
  <h1>🎯 LIVE SCORE</h1>
  <p class="subtitle">Track scores round by round &bull; Best of 3</p>
</header>

<!-- Hamburger nav -->
<div class="nav-overlay" onclick="toggleMenu()"></div>
<nav class="nav-drawer">
  <a href="index.html"><span class="nav-icon">🏠</span> Home</a>
  <a href="roster.html"><span class="nav-icon">📋</span> Roster</a>
  <a href="livescore.html" class="active"><span class="nav-icon">🎯</span> Live Score</a>
  <a href="history.html"><span class="nav-icon">📜</span> Match History</a>
  <a href="leaderboard.html"><span class="nav-icon">🏅</span> Leaderboard</a>
  <a href="admin.html"><span class="nav-icon">⚙️</span> Admin</a>
</nav>

<div class="container">

  <!-- Setup phase -->
  <div id="setup-phase">
    <div class="setup-card">

      <!-- Mode selector -->
      <div class="mode-cards">
        <div class="mode-card selected" id="mode-card-league" onclick="selectMode('league')">
          <div class="mc-icon">🏆</div>
          <div class="mc-title">League Match</div>
          <div class="mc-desc">Official PCL game — result saved</div>
        </div>
        <div class="mode-card" id="mode-card-casual" onclick="selectMode('casual')">
          <div class="mc-icon">🎲</div>
          <div class="mc-title">Casual Game</div>
          <div class="mc-desc">Anyone can play — no record kept</div>
        </div>
      </div>

      <!-- League mode -->
      <div id="mode-league" class="mode-section visible">
        <label for="score-week">Match Week</label>
        <select id="score-week" onchange="onSetupChange()">
          <option value="">-- Select week --</option>
        </select>

        <label for="score-game" style="margin-top:14px;">Game</label>
        <select id="score-game" onchange="onSetupChange()">
          <option value="">-- Select game --</option>
        </select>

        <div id="setup-preview"></div>

        <button id="start-match-btn" class="start-btn" disabled onclick="startMatch()">START MATCH 🔥</button>
      </div>

      <!-- Casual mode -->
      <div id="mode-casual" class="mode-section">
        <div class="casual-team-block">
          <div class="ctb-header">
            <div class="ctb-emoji">🔴</div>
            <input class="ctb-name-input" id="casual-name-a" type="text" placeholder="Team name (optional)" value="Team A">
          </div>
          <div class="ctb-players-label">Players</div>
          <div class="ctb-pills" id="casual-pills-a"></div>
        </div>

        <div class="casual-team-block">
          <div class="ctb-header">
            <div class="ctb-emoji">🔵</div>
            <input class="ctb-name-input" id="casual-name-b" type="text" placeholder="Team name (optional)" value="Team B">
          </div>
          <div class="ctb-players-label">Players</div>
          <div class="ctb-pills" id="casual-pills-b"></div>
        </div>

        <button class="start-btn" onclick="startCasualMatch()" style="margin-top:6px;">START MATCH 🔥</button>
      </div>

    </div>

let _resultsCache = [];

// ══════════════════════════════════════════════

let currentMode = 'league';

function selectMode(mode) {
  currentMode = mode;

  document.querySelectorAll('.mode-section').forEach(el => el.classList.remove('visible'));

// ── Casual player management ──
const casualPlayers = { a: [], b: [] };

function renderCasualPills(team) {
  const container = document.getElementById(`casual-pills-${team}`);
  container.innerHTML = '';

  casualPlayers[team].forEach((name, idx) => {
    const pill = document.createElement('div');
    pill.className = 'ctb-pill';
    pill.innerHTML = `${name} <button class="ctb-pill-remove" onclick="removeCasualPlayer('${team}', ${idx})">✕</button>`;
    container.appendChild(pill);
  });

  // Add button

  addBtn.onclick = () => showCasualAddInput(team);
  container.appendChild(addBtn);

  // Inline input (hidden)
  const addInput = document.createElement('div');
  addInput.className = 'ctb-add-input';
  addInput.id = `casual-add-input-${team}`;
  addInput.innerHTML = `
    <input type="text" id="casual-add-field-${team}" placeholder="Name…" maxlength="30">
    <button class="ctb-confirm-btn" onclick="confirmCasualPlayer('${team}')">✓</button>
    <button class="ctb-cancel-btn" onclick="cancelCasualAdd('${team}')">✕</button>
  `;
  container.appendChild(addInput);

  setTimeout(() => {
    const field = document.getElementById(`casual-add-field-${team}`);
    if (field) {
      field.addEventListener('keydown', e => {

function showCasualAddInput(team) {

  document.getElementById(`casual-add-field-${team}`).focus();
}

function confirmCasualPlayer(team) {
  const field = document.getElementById(`casual-add-field-${team}`);
  const name = field.value.trim();
  if (name) casualPlayers[team].push(name);
  renderCasualPills(team);
}

function cancelCasualAdd(team) {
  renderCasualPills(team);
}

function removeCasualPlayer(team, idx) {
  casualPlayers[team].splice(idx, 1);
  renderCasualPills(team);
}

// ══════════════════════════════════════════════
//  SETUP PHASE
// ══════════════════════════════════════════════
function populateWeeks() {
  const sel = document.getElementById('score-week');
  SCHEDULE.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.wk;
    opt.textContent = `Week ${s.wk} — ${s.date}`;
    sel.appendChild(opt);
  });
}

function onSetupChange() {
  const wkVal = document.getElementById('score-week').value;
  const gameSel = document.getElementById('score-game');
  const preview = document.getElementById('setup-preview');
  const btn = document.getElementById('start-match-btn');

  if (!wkVal) {
    gameSel.innerHTML = '<option value="">-- Select game --</option>';
    preview.innerHTML = '';
    btn.disabled = true;
    return;
  }

  const wk = SCHEDULE[parseInt(wkVal) - 1];

  if (gameSel.dataset.week !== wkVal) {
    gameSel.dataset.week = wkVal;
    gameSel.innerHTML = '<option value="">-- Select game --</option>';
    const g1opt = document.createElement('option');
    g1opt.value = 'g1';
    g1opt.textContent = `Game 1: ${TEAMS[wk.g1[0]].emoji} ${TEAMS[wk.g1[0]].name} vs ${TEAMS[wk.g1[1]].emoji} ${TEAMS[wk.g1[1]].name}`;
    gameSel.appendChild(g1opt);
    const g2opt = document.createElement('option');
    g2opt.value = 'g2';
    g2opt.textContent = `Game 2: ${TEAMS[wk.g2[0]].emoji} ${TEAMS[wk.g2[0]].name} vs ${TEAMS[wk.g2[1]].emoji} ${TEAMS[wk.g2[1]].name}`;
    gameSel.appendChild(g2opt);
  }

  const gameVal = gameSel.value;
  if (!gameVal) {
    preview.innerHTML = '';
    btn.disabled = true;
    return;
  }

  updatePreview();
}

function updatePreview() {
  const wkVal = document.getElementById('score-week').value;
  const gameVal = document.getElementById('score-game').value;
  const preview = document.getElementById('setup-preview');
  const btn = document.getElementById('start-match-btn');

  if (!wkVal || !gameVal) return;

  const wk = SCHEDULE[parseInt(wkVal) - 1];
  const game = wk[gameVal];
  const tA = game[0], tB = game[1];

  const results = loadResults();
  const existing = results.find(r => r.week === parseInt(wkVal) && r.gameSlot === gameVal);
  if (existing) {
    preview.innerHTML = `<div class="matchup-preview" style="border-color:var(--accent3);">✅ This match already has a result: <strong>${TEAMS[existing.teamA].emoji} ${TEAMS[existing.teamA].name} ${existing.winsA}–${existing.winsB} ${TEAMS[existing.teamB].emoji} ${TEAMS[existing.teamB].name}</strong><br><small style="color:var(--muted);">Starting a new match will overwrite the previous result.</small></div>`;
  } else {
    preview.innerHTML = `<div class="matchup-preview"><strong>${TEAMS[tA].emoji} ${TEAMS[tA].name}</strong> vs <strong>${TEAMS[tB].emoji} ${TEAMS[tB].name}</strong><br><small style="color:var(--muted);">Best of 3 &bull; First to 21 per game</small></div>`;
  }
  btn.disabled = false;
}

// ══════════════════════════════════════════════
//  LIVE MATCH STATE
// ══════════════════════════════════════════════
let match = null;

function getPlayersForTeam(teamName, week) {
  const rosters = loadRosters();
  const key = `${week}_${teamName}`;
  if (rosters[key] && rosters[key].players && rosters[key].players.length > 0) {
    return rosters[key].players.slice(0, 2);
  }
  return TEAMS[teamName].players.slice(0, 2);
}

function initPlayerStats(players) {
  const stats = {};
  players.forEach(p => { stats[p] = { holes: 0, leans: 0, boards: 0, pts: 0 }; });
  return stats;
}

function startMatch() {
  const wkVal = parseInt(document.getElementById('score-week').value);
  const gameVal = document.getElementById('score-game').value;
  const wk = SCHEDULE[wkVal - 1];
  const game = wk[gameVal];

  const playersA = getPlayersForTeam(game[0], wkVal);
  const playersB = getPlayersForTeam(game[1], wkVal);

  match = {
    casual: false,
    week: wkVal,
    gameSlot: gameVal,
    teamA: game[0],
    teamB: game[1],
    teamAInfo: { emoji: TEAMS[game[0]].emoji, name: TEAMS[game[0]].name },
    teamBInfo: { emoji: TEAMS[game[1]].emoji, name: TEAMS[game[1]].name },
    playersA,
    playersB,
    playerStats: { ...initPlayerStats(playersA), ...initPlayerStats(playersB) },
    currentGame: 1,
    games: [],
    winsA: 0,
    winsB: 0,
    roundScoreA: 0,
    roundScoreB: 0,
    actions: [],
    rounds: [],
    matchOver: false,
    overtimeMode: false
  };

  document.getElementById('setup-phase').style.display = 'none';
  document.getElementById('scoring-phase').style.display = 'block';
  renderScoreboard();
}

function startCasualMatch() {
  const nameA = document.getElementById('casual-name-a').value.trim() || 'Team A';
  const nameB = document.getElementById('casual-name-b').value.trim() || 'Team B';
  const playersA = casualPlayers.a.length ? casualPlayers.a : ['Player 1'];
  const playersB = casualPlayers.b.length ? casualPlayers.b : ['Player 1'];

  match = {
    casual: true,
    week: null,
    gameSlot: null,
    teamA: '__casual_a__',
    teamB: '__casual_b__',
    teamAInfo: { emoji: '🔴', name: nameA },
    teamBInfo: { emoji: '🔵', name: nameB },
    playersA,
    playersB,
    playerStats: { ...initPlayerStats(playersA), ...initPlayerStats(playersB) },
    currentGame: 1,
    games: [],
    winsA: 0,
    winsB: 0,
    roundScoreA: 0,
    roundScoreB: 0,
    actions: [],
    rounds: [],
    matchOver: false,
    overtimeMode: false
  };

  document.getElementById('setup-phase').style.display = 'none';
  document.getElementById('scoring-phase').style.display = 'block';
  renderScoreboard();
}

function renderScoreboard() {
  if (!match) return;
  const tA = match.teamAInfo, tB = match.teamBInfo;

  document.getElementById('sb-match-info').textContent = match.casual
    ? 'Casual Game'
    : `Week ${match.week} — ${SCHEDULE[match.week-1].date}`;
  const roundsPlayed = match.rounds.length;
  let gameLabel;
  if (match.matchOver) {
    gameLabel = 'MATCH COMPLETE';
  } else if (match.overtimeMode) {
    gameLabel = `Game ${match.currentGame} of 3 — ⚡ OVERTIME`;
  } else {
    gameLabel = `Game ${match.currentGame} of 3 — Round ${roundsPlayed + 1}/10`;
  }
  document.getElementById('sb-game-label').textContent = gameLabel;

  document.getElementById('sb-emoji-a').textContent = tA.emoji;
  document.getElementById('sb-name-a').textContent = tA.name;
  document.getElementById('sb-emoji-b').textContent = tB.emoji;
  document.getElementById('sb-name-b').textContent = tB.name;

  const runningA = match.rounds.reduce((s, r) => s + r.a, 0) + match.roundScoreA;
  const runningB = match.rounds.reduce((s, r) => s + r.b, 0) + match.roundScoreB;
  document.getElementById('sb-score-a').textContent = runningA;
  document.getElementById('sb-score-b').textContent = runningB;

  // Series tracker dots
  let dotsHtml = '';
  for (let i = 1; i <= 3; i++) {
    const gameResult = match.games[i-1];
    let cls = '';
    let label = i;
    if (gameResult) {
      if (gameResult.winner === 'a') { cls = 'won-a'; label = match.teamAInfo.emoji; }
      else { cls = 'won-b'; label = match.teamBInfo.emoji; }
    } else if (i === match.currentGame && !match.matchOver) {
      cls = 'current';
    }
    dotsHtml += `<div class="series-dot ${cls}" title="Game ${i}">${label}</div>`;
  }
  document.getElementById('series-tracker').innerHTML = dotsHtml;

  // Series score display
  document.querySelector('.sb-vs').textContent = `${match.winsA} — ${match.winsB}`;

  // Player cards
  renderPlayerCards();

  // Round log
  renderRoundLog();

  // Disable scoring buttons if match over
  document.querySelectorAll('.score-btn, #end-round-btn, #end-game-btn').forEach(b => {
    b.disabled = match.matchOver;
  });

  // Winner banner
  renderGameWinnerBanner();
}

function renderPlayerCards() {
  if (!match) return;
  const colorA = match.casual ? '#c0392b' : (TEAMS[match.teamA] ? TEAMS[match.teamA].color : '#c0392b');
  const colorB = match.casual ? '#2980b9' : (TEAMS[match.teamB] ? TEAMS[match.teamB].color : '#2980b9');

  document.getElementById('section-label-a').innerHTML = `${match.teamAInfo.emoji} ${match.teamAInfo.name}`;
  document.getElementById('section-label-b').innerHTML = `${match.teamBInfo.emoji} ${match.teamBInfo.name}`;

  document.getElementById('player-cards-a').innerHTML = match.playersA.map(p => buildPlayerCard(p, 'a', colorA)).join('');
  document.getElementById('player-cards-b').innerHTML = match.playersB.map(p => buildPlayerCard(p, 'b', colorB)).join('');
}

function buildPlayerCard(player, side, teamColor) {
  const s = match.playerStats[player] || { holes: 0, leans: 0, boards: 0, pts: 0 };
  const disabled = match.matchOver ? 'disabled' : '';
  const escapedPlayer = player.replace(/'/g, "\\'");
  return `
    <div class="player-card" style="border-color: ${teamColor}33;">
      <div class="player-card-name" style="color: ${teamColor};">${player}</div>
      <div class="player-card-stats">
        <div class="player-stat">🕳️ <span class="player-stat-val">${s.holes}</span></div>
        <div class="player-stat">🎯 <span class="player-stat-val">${s.leans}</span></div>
        <div class="player-stat">🟫 <span class="player-stat-val">${s.boards}</span></div>
      </div>
      <div class="player-card-pts">${s.pts} pts</div>
      <div class="player-card-btns">
        <button class="score-btn hole" ${disabled} onclick="addScore('${side}','${escapedPlayer}',3)">🕳️ +3</button>
        <button class="score-btn lean" ${disabled} onclick="addScore('${side}','${escapedPlayer}',2)">🎯 +2</button>
        <button class="score-btn board" ${disabled} onclick="addScore('${side}','${escapedPlayer}',1)">🟫 +1</button>
        <button class="score-btn neg" ${disabled} onclick="addScore('${side}','${escapedPlayer}',-1)">-1</button>
        <button class="score-btn neg" ${disabled} onclick="addScore('${side}','${escapedPlayer}',-2)">-2</button>
      </div>
    </div>`;
}

function throwPips(throws, side) {
  if (!throws || throws.length === 0) return '';
  const sideThrows = throws.filter(t => t.side === side);
  if (sideThrows.length === 0) return '';
  return '<div class="throw-detail">' + sideThrows.map(t => {
    const cls = t.pts === 3 ? 'hole' : t.pts === 2 ? 'lean' : t.pts === 1 ? 'board' : t.pts < 0 ? 'neg' : 'board';
    const title = t.player ? ` title="${t.player}"` : '';
    return `<span class="throw-pip ${cls}"${title}>${t.pts > 0 ? '+' : ''}${t.pts}</span>`;
  }).join('') + '</div>';
}

function renderRoundLog() {
  const log = document.getElementById('round-log');
  if (match.rounds.length === 0 && match.actions.length === 0) {
    log.innerHTML = '<div style="text-align:center;font-size:0.75rem;color:rgba(255,255,255,0.3);padding:8px;">Rounds will appear here</div>';
    return;
  }
  let html = '<div style="display:flex;justify-content:space-between;font-size:0.65rem;color:rgba(255,255,255,0.3);padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;"><span style="width:30px;">Rnd</span><span style="width:60px;text-align:center;">' + match.teamA + '</span><span style="width:60px;text-align:center;">' + match.teamB + '</span><span style="width:60px;text-align:right;">Net</span></div>';
  let runA = 0, runB = 0;
  match.rounds.forEach((r, i) => {
    runA += r.a; runB += r.b;
    const diff = r.a - r.b;
    const diffCls = diff > 0 ? 'pos' : diff < 0 ? 'neg' : 'zero';
    const diffStr = diff > 0 ? `+${diff}` : diff < 0 ? `${diff}` : '0';
    html += `<div class="round-entry"><span class="round-num">${i+1}</span><span class="round-a">${r.rawA}${throwPips(r.throws,'a')}</span><span class="round-b">${r.rawB}${throwPips(r.throws,'b')}</span><span class="round-diff ${diffCls}">${diffStr}</span></div>`;
  });
  if (match.actions.length > 0 && !match.matchOver) {
    html += `<div class="round-entry" style="opacity:0.5;font-style:italic;"><span class="round-num">▸</span><span class="round-a">${match.roundScoreA}${throwPips(match.actions,'a')}</span><span class="round-b">${match.roundScoreB}${throwPips(match.actions,'b')}</span><span class="round-diff zero">…</span></div>`;
  }
  html += `<div class="round-entry" style="border-top:1px solid rgba(255,255,255,0.1);margin-top:4px;padding-top:4px;font-weight:700;color:rgba(255,255,255,0.7);"><span class="round-num">Σ</span><span class="round-a">${runA}</span><span class="round-b">${runB}</span><span class="round-diff ${runA>runB?'pos':runA<runB?'neg':'zero'}">${runA>runB?'+':''}${runA-runB}</span></div>`;
  log.innerHTML = html;
}

function renderGameWinnerBanner() {
  const el = document.getElementById('game-winner-banner');
  if (!match.matchOver) { el.innerHTML = ''; return; }

  const winnerInfo = match.winsA > match.winsB ? match.teamAInfo : match.teamBInfo;
  el.innerHTML = `
    <div class="winner-banner">
      <div class="trophy">🏆</div>
      <div class="winner-text">${winnerInfo.emoji} ${winnerInfo.name.toUpperCase()} WINS!</div>
      <div class="match-summary">Final: ${match.teamAInfo.name} ${match.winsA} — ${match.winsB} ${match.teamBInfo.name}</div>
    </div>`;
}

// ══════════════════════════════════════════════
//  SCORING ACTIONS
// ══════════════════════════════════════════════
function addScore(side, player, pts) {
  if (!match || match.matchOver) return;
  match.actions.push({ side, player, pts });
  if (side === 'a') match.roundScoreA += pts;
  else match.roundScoreB += pts;

  const ps = match.playerStats[player];
  if (ps) {
    ps.pts += pts;
    if (pts === 3) ps.holes++;
    else if (pts === 2) ps.leans++;
    else if (pts === 1) ps.boards++;
    else if (pts === -1) ps.boards--;
    else if (pts === -2) ps.leans--;
  }

  renderScoreboard();
}

function undoLastAction() {
  if (!match || match.actions.length === 0 || match.matchOver) return;
  const last = match.actions.pop();
  if (last.side === 'a') match.roundScoreA -= last.pts;
  else match.roundScoreB -= last.pts;

  const ps = match.playerStats[last.player];
  if (ps) {
    ps.pts -= last.pts;
    if (last.pts === 3) ps.holes--;
    else if (last.pts === 2) ps.leans--;
    else if (last.pts === 1) ps.boards--;
    else if (last.pts === -1) ps.boards++;
    else if (last.pts === -2) ps.leans++;
  }

  renderScoreboard();
}

function endGameEarly() {
  if (!match || match.matchOver) return;

  const totalA = match.rounds.reduce((s, r) => s + r.a, 0) + match.roundScoreA;
  const totalB = match.rounds.reduce((s, r) => s + r.b, 0) + match.roundScoreB;

  const tA = match.teamAInfo.name;
  const tB = match.teamBInfo.name;
  const msg = totalA === totalB
    ? `Scores are tied ${totalA}–${totalB}. This will start sudden-death overtime. Continue?`
    : `End game now? ${totalA > totalB ? tA : tB} leads ${Math.max(totalA, totalB)}–${Math.min(totalA, totalB)}.`;

  if (!confirm(msg)) return;

  // Commit any current round scores as a final round
  if (match.roundScoreA !== 0 || match.roundScoreB !== 0 || match.actions.length > 0) {
    match.rounds.push({ a: match.roundScoreA, b: match.roundScoreB, rawA: match.roundScoreA, rawB: match.roundScoreB, throws: [...match.actions] });
    match.roundScoreA = 0;
    match.roundScoreB = 0;
    match.actions = [];
  }

  const finalA = match.rounds.reduce((s, r) => s + r.a, 0);
  const finalB = match.rounds.reduce((s, r) => s + r.b, 0);

  if (finalA !== finalB) {
    const gameWinner = finalA > finalB ? 'a' : 'b';
    match.games.push({ scoreA: finalA, scoreB: finalB, winner: gameWinner, rounds: [...match.rounds] });
    if (gameWinner === 'a') match.winsA++; else match.winsB++;
    match.rounds = [];
    match.overtimeMode = false;

    if (match.winsA >= 2 || match.winsB >= 2) {
      match.matchOver = true;
      saveMatchResult();
    } else {
      match.currentGame++;
    }
  } else {
    // Tied — enter sudden-death overtime
    match.overtimeMode = true;
  }

  renderScoreboard();
}

function endRound() {
  if (!match || match.matchOver) return;

  const roundA = match.roundScoreA;
  const roundB = match.roundScoreB;

  const currentRounds = match.rounds;
  let totalA = currentRounds.reduce((s, r) => s + r.a, 0) + roundA;
  let totalB = currentRounds.reduce((s, r) => s + r.b, 0) + roundB;

  match.rounds.push({ a: roundA, b: roundB, rawA: roundA, rawB: roundB, throws: [...match.actions] });
  match.roundScoreA = 0;
  match.roundScoreB = 0;
  match.actions = [];

  const MAX_ROUNDS = 20;
  const roundCount = match.rounds.length;

  if (totalA >= 21 || totalB >= 21) {
    // Someone hit 21 — normal win
    const gameWinner = totalA >= totalB ? 'a' : 'b';
    match.games.push({
      scoreA: totalA,
      scoreB: totalB,
      winner: gameWinner,
      rounds: [...match.rounds]
    });

    if (gameWinner === 'a') match.winsA++; else match.winsB++;
    match.rounds = [];
    match.overtimeMode = false;

    if (match.winsA >= 2 || match.winsB >= 2) {
      match.matchOver = true;
      saveMatchResult();
    } else {
      match.currentGame++;
    }
  } else if (roundCount >= MAX_ROUNDS || match.overtimeMode) {
    // 20-round limit reached (or already in overtime)
    if (totalA !== totalB) {
      // Clear winner by score
      const gameWinner = totalA > totalB ? 'a' : 'b';
      match.games.push({
        scoreA: totalA,
        scoreB: totalB,
        winner: gameWinner,
        rounds: [...match.rounds]
      });

      if (gameWinner === 'a') match.winsA++; else match.winsB++;
      match.rounds = [];
      match.overtimeMode = false;

      if (match.winsA >= 2 || match.winsB >= 2) {
        match.matchOver = true;
        saveMatchResult();
      } else {
        match.currentGame++;
      }
    } else {
      // Tied after 20 rounds — sudden-death overtime, keep playing
      match.overtimeMode = true;
    }
  }

  renderScoreboard();
}

function saveMatchResult() {
  if (!match || match.casual) return; // casual games are not saved
  const results = loadResults();

  const gameScores = match.games.map(g => ({ scoreA: g.scoreA, scoreB: g.scoreB, winner: g.winner, rounds: g.rounds }));

  const playerStats = {};
  [...match.playersA, ...match.playersB].forEach(p => {
    if (match.playerStats[p]) playerStats[p] = { ...match.playerStats[p] };
  });

  const idx = results.findIndex(r => r.week === match.week && r.gameSlot === match.gameSlot);
  const result = {
    week: match.week,
    gameSlot: match.gameSlot,
    teamA: match.teamA,
    teamB: match.teamB,
    winsA: match.winsA,
    winsB: match.winsB,
    gameScores,
    playersA: match.playersA,
    playersB: match.playersB,
    playerStats,
    timestamp: new Date().toISOString()
  };
  if (idx >= 0) results[idx] = result;
  else results.push(result);

  saveResults(results);
}

function abandonMatch() {
  if (match && !match.matchOver) {
    const msg = match.casual
      ? 'End this casual game? Scores will be lost.'
      : 'End this match without saving? Any scores from this match will be lost.';
    if (!confirm(msg)) return;
  }
  match = null;
  document.getElementById('scoring-phase').style.display = 'none';
  document.getElementById('setup-phase').style.display = 'block';
  // Reset league selectors
  document.getElementById('score-week').value = '';
  document.getElementById('score-game').innerHTML = '<option value="">-- Select game --</option>';
  document.getElementById('setup-preview').innerHTML = '';
  document.getElementById('start-match-btn').disabled = true;
  // Reset casual fields
  casualPlayers.a = [];
  casualPlayers.b = [];
  document.getElementById('casual-name-a').value = 'Team A';
  document.getElementById('casual-name-b').value = 'Team B';
  renderCasualPills('a');
  renderCasualPills('b');
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
populateWeeks();
renderCasualPills('a');
renderCasualPills('b');

// ── URL Parameter Deep-Linking ──
(function handleUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const week = params.get('week');
  const game = params.get('game');

  if (week) {
    const weekSel = document.getElementById('score-week');
    weekSel.value = week;
    onSetupChange();

    if (game) {
      setTimeout(() => {
        const gameSel = document.getElementById('score-game');
        gameSel.value = game;
        onSetupChange();
      }, 50);
    }
  }
})();
</script>
