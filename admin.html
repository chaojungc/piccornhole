<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCL Admin - Reschedule Matches</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #fdf6ec;
    --card: #ffffff;
    --accent: #c0392b;
    --accent2: #e67e22;
    --accent3: #27ae60;
    --dark: #2c3e50;
    --muted: #7f8c8d;
    --border: #e0d5c1;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--dark);
    line-height: 1.6;
  }

  /* ── Hero ── */
  .hero {
    background: linear-gradient(135deg, #2c3e50 0%, #34495e 50%, #7f8c8d 100%);
    color: white;
    text-align: center;
    padding: 50px 20px 40px;
    position: relative;
    overflow: hidden;
  }
  .hero h1 {
    font-family: 'Bangers', cursive;
    font-size: clamp(2rem, 5vw, 3rem);
    letter-spacing: 3px;
    position: relative;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
  }
  .hero .subtitle {
    font-size: 1rem;
    opacity: 0.9;
    margin-top: 8px;
    position: relative;
  }

  /* ── Container ── */
  .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
  section { padding: 30px 0 50px; }

  /* ── Hamburger Menu ── */
  .hamburger-btn {
    position: absolute;
    top: 16px; left: 20px;
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    z-index: 1010;
    transition: background 0.2s;
  }
  .hamburger-btn:hover { background: rgba(255,255,255,0.25); }
  .hamburger-btn span {
    display: block;
    width: 22px; height: 2px;
    background: white;
    border-radius: 2px;
    transition: all 0.3s;
  }
  .hamburger-btn.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  .hamburger-btn.open span:nth-child(2) { opacity: 0; }
  .hamburger-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
  .nav-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .nav-overlay.open { opacity: 1; pointer-events: auto; }
  .nav-drawer {
    position: fixed;
    top: 0; left: -280px;
    width: 280px; height: 100%;
    background: var(--card);
    z-index: 1000;
    box-shadow: 4px 0 20px rgba(0,0,0,0.15);
    transition: left 0.3s;
    padding: 80px 0 40px;
    display: flex;
    flex-direction: column;
  }
  .nav-drawer.open { left: 0; }
  .nav-drawer a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 28px;
    text-decoration: none;
    color: var(--dark);
    font-weight: 600;
    font-size: 0.95rem;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .nav-drawer a:hover { background: #fef9f0; }
  .nav-drawer a.active {
    background: var(--accent);
    color: white;
    border-left-color: var(--accent2);
  }
  .nav-drawer .nav-icon { font-size: 1.2rem; width: 24px; text-align: center; }

  /* ── Week Cards ── */
  .week-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
    border-left: 4px solid var(--border);
    transition: border-left-color 0.3s;
  }
  .week-card.has-override { border-left-color: var(--accent2); }
  .week-card.has-result { border-left-color: var(--accent3); }

  .week-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .week-card-header:hover { background: rgba(0,0,0,0.02); }

  .week-card-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .week-num-circle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--dark);
    color: white;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .week-info {
    display: flex;
    flex-direction: column;
  }
  .week-title {
    font-weight: 700;
    font-size: 0.95rem;
  }
  .week-matchups {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .week-card-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .week-status {
    font-size: 0.75rem;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .week-status.completed { background: rgba(39,174,96,0.1); color: var(--accent3); }
  .week-status.upcoming { background: rgba(44,62,80,0.08); color: var(--dark); }
  .week-status.rescheduled { background: rgba(230,126,34,0.12); color: var(--accent2); }

  .expand-icon {
    font-size: 1.1rem;
    color: var(--muted);
    transition: transform 0.3s;
  }
  .week-card.open .expand-icon { transform: rotate(180deg); }

  /* ── Expanded Body ── */
  .week-card-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease-out;
    border-top: 0px solid var(--border);
  }
  .week-card.open .week-card-body {
    max-height: 400px;
    border-top-width: 1px;
  }
  .week-card-body-inner { padding: 4px 20px 20px; }

  .game-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    gap: 12px;
    flex-wrap: wrap;
  }
  .game-row:last-of-type { border-bottom: none; }

  .game-label {
    font-weight: 600;
    font-size: 0.9rem;
    flex: 1;
    min-width: 180px;
  }
  .game-label small {
    font-weight: 400;
    color: var(--muted);
    font-size: 0.78rem;
  }

  .game-date-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .date-input {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.85rem;
    font-family: 'Inter', sans-serif;
    color: var(--dark);
    background: white;
    width: 145px;
    transition: border-color 0.2s;
  }
  .date-input:focus { outline: none; border-color: var(--accent2); }
  .date-input.overridden {
    border-color: var(--accent2);
    background: rgba(230,126,34,0.04);
    font-weight: 600;
    color: var(--accent2);
  }

  .original-date-strike {
    font-size: 0.75rem;
    color: var(--muted);
    text-decoration: line-through;
  }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    cursor: pointer;
    font-size: 0.75rem;
    color: var(--muted);
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  .game-result-badge {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--accent3);
    background: rgba(39,174,96,0.08);
    padding: 3px 10px;
    border-radius: 12px;
  }

  /* ── Save bar ── */
  .save-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .save-note {
    font-size: 0.78rem;
    color: var(--muted);
    font-style: italic;
  }
  .save-btn {
    background: var(--accent3);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .save-btn:hover { background: #219a52; }
  .save-btn.saved { background: var(--muted); cursor: default; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--dark);
    color: white;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    transition: transform 0.3s;
    z-index: 2000;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 30px 20px;
    color: var(--muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .hero { padding: 40px 16px 30px; }
    .hero h1 { font-size: 1.8rem; }
    .game-row { flex-direction: column; align-items: flex-start; }
    .game-date-group { width: 100%; }
  }
</style>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
</head>
<body>

<!-- ═══════ HERO ═══════ -->
<header class="hero">
  <button class="hamburger-btn" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
  <h1>⚙️ ADMIN: RESCHEDULE</h1>
  <p class="subtitle">Change individual game dates when weather (or life) gets in the way.</p>
</header>

<div class="nav-overlay" onclick="toggleMenu()"></div>
<nav class="nav-drawer">
  <a href="index.html"><span class="nav-icon">🏠</span> Home</a>
  <a href="roster.html"><span class="nav-icon">📋</span> Roster</a>
  <a href="livescore.html"><span class="nav-icon">🎯</span> Live Score</a>
  <a href="history.html"><span class="nav-icon">📜</span> Match History</a>
  <a href="leaderboard.html"><span class="nav-icon">🏅</span> Leaderboard</a>
  <a href="admin.html" class="active"><span class="nav-icon">⚙️</span> Admin</a>
</nav>

<!-- ═══════ WEEK CARDS ═══════ -->
<section>
  <div class="container" id="weeks-container">
    <!-- Rendered by JS -->
  </div>
</section>

<footer>
  <p>🌽 PicCollage Cornhole League &bull; Admin Panel &bull; Season 1</p>
</footer>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  FIREBASE CONFIG
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyBeXELSbgnDbLCIUGeB1hSdmOFKbs-KorI",
  authDomain:        "piccornhole.firebaseapp.com",
  databaseURL:       "https://piccornhole-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "piccornhole",
  storageBucket:     "piccornhole.firebasestorage.app",
  messagingSenderId: "1005077269160",
  appId:             "1:1005077269160:web:d724b5f66eeb44145a109d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── Data ──
const TEAM_INFO = {
  Althea:  { emoji: "🔴" },
  Justin:  { emoji: "🔵" },
  Nana:    { emoji: "🟣" },
  Liyu:    { emoji: "🟢" },
  Landice: { emoji: "🟠" }
};

const SCHEDULE = [
  { wk:1,  date:"Mar 4",   g1:["Althea","Nana"],    g2:["Liyu","Landice"],   bye:"Justin" },
  { wk:2,  date:"Mar 11",  g1:["Justin","Nana"],    g2:["Althea","Liyu"],    bye:"Landice" },
  { wk:3,  date:"Mar 18",  g1:["Justin","Landice"], g2:["Nana","Liyu"],      bye:"Althea" },
  { wk:4,  date:"Mar 25",  g1:["Justin","Liyu"],    g2:["Landice","Althea"], bye:"Nana" },
  { wk:5,  date:"Apr 1",   g1:["Justin","Althea"],  g2:["Landice","Nana"],   bye:"Liyu" },
  { wk:6,  date:"Apr 8",   g1:["Nana","Althea"],    g2:["Landice","Liyu"],   bye:"Justin" },
  { wk:7,  date:"Apr 15",  g1:["Nana","Justin"],    g2:["Liyu","Althea"],    bye:"Landice" },
  { wk:8,  date:"Apr 22",  g1:["Landice","Justin"], g2:["Liyu","Nana"],      bye:"Althea" },
  { wk:9,  date:"Apr 29",  g1:["Liyu","Justin"],    g2:["Althea","Landice"], bye:"Nana" },
  { wk:10, date:"May 6",   g1:["Althea","Justin"],  g2:["Nana","Landice"],   bye:"Liyu" },
  { wk:11, date:"May 13",  g1:["Althea","Nana"],    g2:["Liyu","Landice"],   bye:"Justin" },
  { wk:12, date:"May 20",  g1:["Justin","Nana"],    g2:["Althea","Liyu"],    bye:"Landice" },
  { wk:13, date:"May 27",  g1:["Justin","Landice"], g2:["Nana","Liyu"],      bye:"Althea" },
  { wk:14, date:"Jun 3",   g1:["Justin","Liyu"],    g2:["Landice","Althea"], bye:"Nana" },
  { wk:15, date:"Jun 10",  g1:["Justin","Althea"],  g2:["Landice","Nana"],   bye:"Liyu" },
  { wk:16, date:"Jun 17",  g1:["Nana","Althea"],    g2:["Landice","Liyu"],   bye:"Justin" },
  { wk:17, date:"Jun 24",  g1:["Nana","Justin"],    g2:["Liyu","Althea"],    bye:"Landice" },
  { wk:18, date:"Jul 1",   g1:["Landice","Justin"], g2:["Liyu","Nana"],      bye:"Althea" },
  { wk:19, date:"Jul 8",   g1:["Liyu","Justin"],    g2:["Althea","Landice"], bye:"Nana" },
  { wk:20, date:"Jul 15",  g1:["Althea","Justin"],  g2:["Nana","Landice"],   bye:"Liyu" }
];

// ── State ──
let _resultsCache = [];
let _overridesCache = {};

// ── Helpers ──
function friendlyDateToISO(dateStr) {
  // "Mar 4" → "2026-03-04"
  const d = new Date(dateStr + ' 2026');
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function isoToFriendly(iso) {
  // "2026-03-11" → "Mar 11"
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Render all week cards ──
function renderWeeks() {
  const container = document.getElementById('weeks-container');
  container.innerHTML = SCHEDULE.map(s => {
    const tA1 = TEAM_INFO[s.g1[0]], tA2 = TEAM_INFO[s.g1[1]];
    const tB1 = TEAM_INFO[s.g2[0]], tB2 = TEAM_INFO[s.g2[1]];
    const matchups = tA1.emoji + ' ' + s.g1[0] + ' vs ' + tA2.emoji + ' ' + s.g1[1]
      + ' • ' + tB1.emoji + ' ' + s.g2[0] + ' vs ' + tB2.emoji + ' ' + s.g2[1]
      + ' • Bye: ' + s.bye;

    // Check overrides
    const ovG1 = _overridesCache[s.wk + '_g1'];
    const ovG2 = _overridesCache[s.wk + '_g2'];
    const hasOverride = ovG1 || ovG2;

    // Check results
    const resG1 = _resultsCache.find(r => r.week === s.wk && r.gameSlot === 'g1');
    const resG2 = _resultsCache.find(r => r.week === s.wk && r.gameSlot === 'g2');
    const fullyPlayed = resG1 && resG2;

    // Card class
    let cardClass = 'week-card';
    if (fullyPlayed) cardClass += ' has-result';
    else if (hasOverride) cardClass += ' has-override';

    // Status badge
    let statusHtml = '';
    if (fullyPlayed) statusHtml = '<span class="week-status completed">✅ Completed</span>';
    else if (hasOverride) statusHtml = '<span class="week-status rescheduled">📅 Rescheduled</span>';
    else statusHtml = '<span class="week-status upcoming">Upcoming</span>';

    // Title with strikethrough if overridden
    let titleDate = s.date;
    if (hasOverride) titleDate = '<span class="original-date-strike">' + s.date + '</span>';

    // Build game rows
    const origISO = friendlyDateToISO(s.date);
    const g1Row = buildGameRow(s.wk, 'g1', s.g1, origISO, ovG1, resG1);
    const g2Row = buildGameRow(s.wk, 'g2', s.g2, origISO, ovG2, resG2);

    // Save bar note
    let saveNote = 'Change dates and click save';
    if (hasOverride) saveNote = 'Games rescheduled from original ' + s.date;

    return '<div class="' + cardClass + '" data-week="' + s.wk + '">'
      + '<div class="week-card-header" onclick="toggleWeek(' + s.wk + ')">'
      + '<div class="week-card-left">'
      + '<span class="week-num-circle">' + s.wk + '</span>'
      + '<div class="week-info">'
      + '<div class="week-title">Week ' + s.wk + ' — ' + titleDate + '</div>'
      + '<div class="week-matchups">' + matchups + '</div>'
      + '</div></div>'
      + '<div class="week-card-right">' + statusHtml + '<span class="expand-icon">▼</span></div>'
      + '</div>'
      + '<div class="week-card-body"><div class="week-card-body-inner">'
      + g1Row + g2Row
      + '<div class="save-bar">'
      + '<span class="save-note">' + saveNote + '</span>'
      + '<button class="save-btn" onclick="saveWeek(' + s.wk + ', event)">Save Changes</button>'
      + '</div>'
      + '</div></div>'
      + '</div>';
  }).join('');
}

function buildGameRow(weekNum, slot, teams, origISO, override, result) {
  const t1 = TEAM_INFO[teams[0]], t2 = TEAM_INFO[teams[1]];
  const slotLabel = slot === 'g1' ? 'Game 1' : 'Game 2';
  const currentDate = override ? override.newDate : origISO;
  const isOverridden = override ? true : false;

  let html = '<div class="game-row">';
  html += '<div class="game-label">' + t1.emoji + ' ' + teams[0] + ' vs ' + t2.emoji + ' ' + teams[1] + ' <small>' + slotLabel + '</small></div>';
  html += '<div class="game-date-group">';

  if (isOverridden) {
    html += '<span class="original-date-strike">' + isoToFriendly(origISO) + '</span>';
  }

  html += '<input type="date" class="date-input' + (isOverridden ? ' overridden' : '') + '"'
    + ' id="date_' + weekNum + '_' + slot + '"'
    + ' value="' + currentDate + '"'
    + ' data-orig="' + origISO + '"'
    + ' onchange="onDateChange(this, ' + weekNum + ')">';
  html += '<button class="reset-btn" title="Reset to original date" onclick="resetDate(' + weekNum + ', \'' + slot + '\')">↩</button>';
  html += '</div>';

  if (result) {
    html += '<span class="game-result-badge">✅ ' + result.winsA + '–' + result.winsB + '</span>';
  }

  html += '</div>';
  return html;
}

// ── Interactions ──
function toggleWeek(wk) {
  const card = document.querySelector('.week-card[data-week="' + wk + '"]');
  if (card) card.classList.toggle('open');
}

function onDateChange(input, weekNum) {
  const orig = input.getAttribute('data-orig');
  if (input.value !== orig) {
    input.classList.add('overridden');
  } else {
    input.classList.remove('overridden');
  }
}

function resetDate(weekNum, slot) {
  const input = document.getElementById('date_' + weekNum + '_' + slot);
  if (!input) return;
  const orig = input.getAttribute('data-orig');
  input.value = orig;
  input.classList.remove('overridden');
}

function saveWeek(weekNum, event) {
  event.stopPropagation();
  const s = SCHEDULE.find(x => x.wk === weekNum);
  if (!s) return;

  const origISO = friendlyDateToISO(s.date);
  const g1Input = document.getElementById('date_' + weekNum + '_g1');
  const g2Input = document.getElementById('date_' + weekNum + '_g2');

  const updates = {};

  // g1
  if (g1Input.value !== origISO) {
    updates['scheduleOverrides/' + weekNum + '_g1'] = { newDate: g1Input.value };
  } else {
    updates['scheduleOverrides/' + weekNum + '_g1'] = null; // remove override
  }

  // g2
  if (g2Input.value !== origISO) {
    updates['scheduleOverrides/' + weekNum + '_g2'] = { newDate: g2Input.value };
  } else {
    updates['scheduleOverrides/' + weekNum + '_g2'] = null;
  }

  db.ref().update(updates)
    .then(() => showToast('✅ Week ' + weekNum + ' saved!'))
    .catch(err => showToast('❌ Error: ' + err.message));
}

// ── Firebase Listeners ──
db.ref('results').on('value', (snap) => {
  _resultsCache = snap.val() || [];
  renderWeeks();
});

db.ref('scheduleOverrides').on('value', (snap) => {
  _overridesCache = snap.val() || {};
  renderWeeks();
});

// ── Hamburger Menu ──
function toggleMenu() {
  document.querySelector('.hamburger-btn').classList.toggle('open');
  document.querySelector('.nav-overlay').classList.toggle('open');
  document.querySelector('.nav-drawer').classList.toggle('open');
}

// Initial render
renderWeeks();
</script>
</body>
</html>
